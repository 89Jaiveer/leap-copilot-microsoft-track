<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LEAP Copilot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles/main.css" />
  </head>
  <body>
    <div class="background-orb orb-a"></div>
    <div class="background-orb orb-b"></div>
    <header class="topbar">
      <div class="brand">
        <img src="./assets/icons/logo-leap.svg" alt="LEAP Copilot logo" class="brand-logo" />
        <div>
          <h1>LEAP Copilot</h1>
          <p>Evidence-backed learning coach</p>
        </div>
      </div>
      <div class="topbar-controls">
        <label for="student-id-input">Student ID</label>
        <input id="student-id-input" type="text" value="S-1024" />
        <button id="refresh-btn" type="button">Refresh</button>
      </div>
    </header>

    <main class="layout">
      <section id="summary-panel" class="panel summary-panel" aria-live="polite"></section>

      <section class="panel recommendations-panel">
        <div class="panel-title-row">
          <h2>7-Day Plan</h2>
          <span id="mode-chip" class="mode-chip hidden">Demo data</span>
        </div>
        <div id="plan-grid" class="plan-grid" aria-live="polite"></div>
        <h2>Recommendations</h2>
        <div id="recommendations-list" class="recommendations-list" aria-live="polite"></div>
      </section>

      <section id="evidence-panel" class="panel evidence-panel" aria-live="polite"></section>
    </main>

    <dialog id="override-dialog" class="override-dialog">
      <form method="dialog" id="override-form">
        <h3>Edit Recommendation</h3>
        <p class="hint">Adjust schedule or effort. LEAP keeps your override and rationale.</p>

        <label for="override-day">Study Day</label>
        <select id="override-day" required>
          <option value="Mon">Monday</option>
          <option value="Tue">Tuesday</option>
          <option value="Wed">Wednesday</option>
          <option value="Thu">Thursday</option>
          <option value="Fri">Friday</option>
          <option value="Sat">Saturday</option>
          <option value="Sun">Sunday</option>
        </select>

        <label for="override-minutes">Planned Minutes</label>
        <input id="override-minutes" type="number" min="10" max="180" step="5" required />

        <label for="override-note">Override Note</label>
        <textarea
          id="override-note"
          rows="3"
          placeholder="Example: Moving this to Thursday after math tutoring."
          required
        ></textarea>

        <menu class="dialog-actions">
          <button type="button" id="cancel-override-btn" class="ghost-btn">Cancel</button>
          <button type="submit">Save Override</button>
        </menu>
      </form>
    </dialog>

    <template id="loading-template">
      <div class="skeleton skeleton-line"></div>
      <div class="skeleton skeleton-line short"></div>
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
    </template>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
